<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clients</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Manage Clients</h1>
  <input id="fullName" placeholder="Full Name">
  <input id="phone" placeholder="Phone">
  <button id="addClientBtn">Add Client</button>

  <h2>Client List</h2>
  <table id="clientsTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Orders</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadClients() {
      const res = await fetch('/clients');
      const clients = await res.json();
      const tbody = document.querySelector("#clientsTable tbody");
      tbody.innerHTML = "";
      clients.forEach(c => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${c.fullName}</td><td>${c.phone}</td><td>${c.orders.length}</td>`;
        tbody.appendChild(tr);
      });
    }

    document.getElementById("addClientBtn").addEventListener("click", async () => {
      const fullName = document.getElementById("fullName").value;
      const phone = document.getElementById("phone").value;
      if (!fullName || !phone) return alert("Full name and phone required");

      const res = await fetch("/client", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({fullName, phone})
      });
      const data = await res.json();
      if (data.error) alert(data.error);
      else alert("Client added!");
      document.getElementById("fullName").value = "";
      document.getElementById("phone").value = "";
      loadClients();
    });

    loadClients();
  </script>
</body>
</html>
