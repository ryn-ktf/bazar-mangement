<body>
  <!-- Your form to add products -->
  <input id="productCode" placeholder="Code">
  <input id="productName" placeholder="Name">
  <input id="productPrice" placeholder="Price" type="number">
  <button id="addProductBtn">Add Product</button>

  <!-- Table to display products -->
  <table>
    <thead>
      <tr><th>Code</th><th>Name</th><th>Price</th></tr>
    </thead>
    <tbody id="productsTableBody"></tbody>
  </table>

  <!-- Script -->
  <script>
    // Add Product Button
    document.getElementById("addProductBtn").addEventListener("click", async () => {
      const code = document.getElementById("productCode").value;
      const name = document.getElementById("productName").value;
      const price = parseFloat(document.getElementById("productPrice").value);
      if (!code || !name || !price) return alert("All fields required!");
      const res = await fetch("/product", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({code, name, price})
      });
      const data = await res.json();
      if (data.error) alert(data.error);
      else {
        alert("Product added!");
        displayProducts();
      }
    });

    // Display Products Table
    async function displayProducts() {
      const res = await fetch("/products");
      const products = await res.json();
      const tbody = document.getElementById("productsTableBody");
      tbody.innerHTML = "";
      products.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${p.code}</td><td>${p.name}</td><td>${p.price}</td>`;
        tbody.appendChild(tr);
      });
    }
    displayProducts(); // call once when page loads
  </script>
</body>
