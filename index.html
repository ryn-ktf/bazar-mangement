<!DOCTYPE html>
<html>
<head>
  <title>Bazar Management Home</title>
  <style>
    /* --- General Styles --- */
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    body {
      font-family: 'Roboto', sans-serif;
      background: #e6f0ff; /* light blue background */
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      color: #003366; /* dark blue */
      margin-top: 50px;
      text-align: center;
    }

    p {
      color: #003366;
      font-size: 1.2em;
      text-align: center;
    }

    /* --- Buttons --- */
    .menu-button {
      background-color: #0059b3; /* nice blue */
      color: white;
      border: none;
      border-radius: 8px;
      padding: 15px 35px;
      margin: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0px 4px 6px rgba(0,0,0,0.2);
    }

    .menu-button:hover {
      background-color: #004080;
      transform: translateY(-2px);
    }

    /* --- Responsive Container --- */
    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8em; }
      p { font-size: 1em; }
      .menu-button {
        width: 80%;
        font-size: 16px;
        padding: 12px 0;
      }
    }
  </style>
</head>
<body>
  <h1>Welcome to Bazar Management</h1>
  <p>Select a section to continue:</p>

  <div class="button-container">
    <button class="menu-button" onclick="location.href='products.html'">Products</button>
    <button class="menu-button" onclick="location.href='orders.html'">Orders</button>
    <button class="menu-button" onclick="location.href='clients.html'">Clients</button>
  </div>
</body>
</html>
